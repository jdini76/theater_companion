name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test -- --run

      - name: Get package version
        id: pkg_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_VERSION: ${{ steps.pkg_version.outputs.version }}
          NEXT_PUBLIC_BUILD_NUMBER: ${{ github.run_number }}
          NEXT_PUBLIC_GIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_ELEVENLABS_API_URL: ${{ secrets.NEXT_PUBLIC_ELEVENLABS_API_URL }}
          NEXT_PUBLIC_DEEPGRAM_API_URL: ${{ secrets.NEXT_PUBLIC_DEEPGRAM_API_URL }}
          OPENROUTER_API_URL: ${{ secrets.OPENROUTER_API_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          NEXT_PUBLIC_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_OPENROUTER_API_URL: ${{ secrets.OPENROUTER_API_URL }}
          NEXT_PUBLIC_OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
